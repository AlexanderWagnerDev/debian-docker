name: Daily Trigger All Branches

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    strategy:
      matrix:
        branch:
          - main
          - 13
      fail-fast: false
    steps:
      - name: Trigger docker-multiarch.yml on ${{ matrix.branch }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-multiarch.yml',
              ref: '${{ matrix.branch }}'
            });
